<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Santraspasos</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="editor-panel" aria-label="Editor del flyer">
        <div class="brand-block">
          <p class="eyebrow">Santraspasos</p>
          <h1>Generador de flyers</h1>
        </div>

        <form class="controls" id="flyerForm">
          <label>
            <span>Marca / franquicia</span>
            <input id="brandName" type="text" value="Tienda de Empanadas" maxlength="34" />
          </label>

          <label>
            <span>Título y subtítulo</span>
            <select id="copyOption">
              <option value="No empieces de cero.|Invertí en una franquicia que ya está funcionando.">No empieces de cero</option>
              <option value="Una gran oportunidad|Ingresá a un negocio que ya tiene local, operación y clientes reales.">Una gran oportunidad</option>
            </select>
          </label>

          <label>
            <span>Monto de inversión</span>
            <input id="investment" type="text" value="USD 40.000" maxlength="28" />
          </label>

          <label>
            <span>Ubicación</span>
            <input id="location" type="text" value="Av. Bartolomé Mitre 665 - Avellaneda" maxlength="54" />
          </label>

          <label>
            <span>Descripción de la oportunidad</span>
            <textarea id="description" rows="3" maxlength="170" placeholder="Opcional"></textarea>
          </label>

          <div class="metric-grid">
            <label>
              <span>Rentabilidad</span>
              <input id="profitability" type="text" placeholder="Opcional" maxlength="24" />
            </label>

            <label>
              <span>Tiempo de recupero</span>
              <input id="payback" type="text" placeholder="Opcional" maxlength="28" />
            </label>

            <label>
              <span>Facturación proyectada</span>
              <input id="projectedRevenue" type="text" placeholder="Opcional" maxlength="24" />
            </label>

            <label>
              <span>Dato extra</span>
              <input id="extraLabel" type="text" placeholder="Etiqueta opcional" maxlength="28" />
            </label>

            <label>
              <span>Valor del dato extra</span>
              <input id="extraValue" type="text" placeholder="Valor opcional" maxlength="28" />
            </label>
          </div>

          <div class="asset-grid">
            <label class="file-input">
              <span>Foto representativa</span>
              <input id="photoInput" type="file" accept="image/*" />
            </label>

            <label class="file-input">
              <span>Logo de la marca</span>
              <input id="logoInput" type="file" accept="image/*" />
            </label>
          </div>

          <div class="filter-grid">
            <label>
              <span>Color del filtro</span>
              <input id="overlayColor" class="color-control" type="color" value="#101010" />
            </label>

            <label>
              <span>Opacidad del filtro</span>
              <input id="overlayOpacity" type="range" min="20" max="85" value="58" />
            </label>

            <label>
              <span>Color de datos</span>
              <input id="metricBoxColor" class="color-control" type="color" value="#ffffff" />
            </label>
          </div>

          <label>
            <span>Copy sistematizado</span>
            <textarea id="generatedCopy" class="copy-output" rows="6" readonly></textarea>
          </label>
        </form>

        <div class="export-actions">
          <button id="downloadPng" class="primary-action" type="button">Descargar PNG</button>
          <button id="downloadJpg" class="secondary-action" type="button">Descargar JPG</button>
        </div>
      </section>

      <section class="preview-panel" aria-label="Vista previa">
        <div class="phone-frame">
          <canvas id="flyerCanvas" width="1080" height="1920"></canvas>
        </div>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
